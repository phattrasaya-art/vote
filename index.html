let votes={};

function login(){
  const u=user.value,p=pass.value;
  const f=users.find(x=>x.username===u&&x.password===p);

  if(f){
    currentUser=f;
    alert("เข้าสู่ระบบแล้ว");

async function vote(name,emoji){

  if(!currentUser || currentUser.role!=="voter")
    return alert("ไม่มีสิทธิ์");

  const m = currentMonth;
  const score = emojiScores[emoji];

  try {

    await fetch(API_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        name,
        emoji,
        score,
        month: m
      })
    });

    // ✅ โหลดใหม่จาก server เท่านั้น
    await loadData();
    render();

  } catch(err){
    console.error(err);
    alert("เชื่อมต่อ server ไม่ได้");
  }
}

function getMode(){
  return document.getElementById("reportMode").value;
}

function getMonth(){
  const mSel = document.getElementById("reportMonth");

  if(getMode() === "monthly"){
    mSel.style.display = "inline-block";
    return mSel.value; // ✅ ใช้ค่าที่เลือกจริง
  }

  mSel.style.display = "none";
  return currentMonth; // ✅ ใช้เดือนปัจจุบันจริง
}

function render(){

const monthNames = [
 "มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน",
 "กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"
];

// ใช้เดือนที่กำลังใช้งาน
const keyMonth = getMonth(); // ใช้เดือนที่เลือกจริง
const mIndex = parseInt(keyMonth.split("-")[1]) - 1;

// แสดงชื่อเดือน
document.getElementById("monthTitle").innerText =
"📅 เดือน " + monthNames[mIndex];

  const mode=getMode();
  const key=getMonth();

  let list=document.getElementById("list");
  let tbody=document.querySelector("#reportTable tbody");
  let top10=document.getElementById("top10");

  list.innerHTML="";
  tbody.innerHTML="";
  top10.innerHTML="";

  let arr=[];

  employees.forEach(emp=>{

    let h=0,l=0,s=0,a=0;

    if(mode==="yearly"){
      for(let m in votes){
        h+=(votes[m]?.[emp.name+"_❤️"]||0);
        l+=(votes[m]?.[emp.name+"_👍"]||0);
        s+=(votes[m]?.[emp.name+"_⭐"]||0);
        a+=(votes[m]?.[emp.name+"_😡"]||0);
      }
    }else{
      h=votes[key]?.[emp.name+"_❤️"]||0;
      l=votes[key]?.[emp.name+"_👍"]||0;
      s=votes[key]?.[emp.name+"_⭐"]||0;
      a=votes[key]?.[emp.name+"_😡"]||0;
    }

    const score=(h*2)+l+s-a;

    arr.push({name:emp.name,role:emp.role,score,h,l,s,a});

    list.innerHTML+=`
    <div class="card">
      <div class="name">${emp.name}</div>
      <div class="role">${emp.role}</div>
      <div class="score">${score}</div>

      <div class="emoji-row">
        <div class="emoji-box" onclick="vote('${emp.name}','❤️')">❤️<div class="count">${h}</div></div>
        <div class="emoji-box" onclick="vote('${emp.name}','👍')">👍<div class="count">${l}</div></div>
        <div class="emoji-box" onclick="vote('${emp.name}','⭐')">⭐<div class="count">${s}</div></div>
        <div class="emoji-box" onclick="vote('${emp.name}','😡')">😡<div class="count">${a}</div></div>
      </div>
<div style="text-align:center;margin-top:6px;">
  <button onclick="undoVote('${emp.name}')">↩️ ยกเลิกโหวตล่าสุด</button>
</div>
    </div>`;
  });

  arr.sort((a,b)=>b.score-a.score);

  const max=arr[0]?.score||1;

  arr.slice(0,10).forEach((x,i)=>{
    top10.innerHTML+=`
    <div class="item rank${i+1}">
      <div class="rank-row">
        <div class="rank-left">
          <div class="rank-number">${i+1}</div>
          <div>${x.name}</div>
        </div>
        <div>${x.score}</div>
      </div>
      <div class="bar">
        <div class="fill" style="width:${(x.score/max)*100}%"></div>
      </div>
    </div>`;
  });

  arr.forEach((x,i)=>{
    tbody.innerHTML+=`
    <tr>
      <td>${i+1}</td>
      <td>${x.name}</td>
      <td>${x.role}</td>
      <td>${x.h}</td>
      <td>${x.l}</td>
      <td>${x.s}</td>
      <td>${x.a}</td>
      <td>${x.score}</td>
    </tr>`;
  });
}

function showPage(p){
  votePage.style.display="none";
  reportPage.style.display="none";
  adminPage.style.display="none";

  if(p==="vote") votePage.style.display="block";
  if(p==="report") reportPage.style.display="block";
  if(p==="admin") adminPage.style.display="block";

  render();
}

function addEmployee(){
  employees.push({name:empName.value,role:empRole.value});
  render();
}
function isAdmin(){
  return currentUser && currentUser.role === "admin";
}
function renderEmployees(){

  if(!isAdmin()) return;

  const box = document.getElementById("empList");
  box.innerHTML = "";

  employees.forEach((emp, i)=>{

    box.innerHTML += `
      <div class="admin-item">
        <div>
          <b>${emp.name}</b><br>
          <small>${emp.role}</small>
        </div>

        <div>
          <button onclick="editEmployee(${i})">✏️</button>
          <button onclick="deleteEmployee(${i})">🗑️</button>
        </div>
      </div>
    `;
  });
}
function addEmployee(){

  if(!isAdmin()){
    alert("ไม่มีสิทธิ์");
    return;
  }

  const name = empName.value.trim();
  const role = empRole.value.trim();

  if(!name || !role){
    alert("กรอกข้อมูลให้ครบ");
    return;
  }

  employees.push({name, role});

  empName.value = "";
  empRole.value = "";

  render();
  renderEmployees();
}
function editEmployee(index){

  if(!isAdmin()){
    alert("ไม่มีสิทธิ์");
    return;
  }

  const newName = prompt("แก้ชื่อ", employees[index].name);
  const newRole = prompt("แก้ตำแหน่ง", employees[index].role);

  if(newName && newRole){
    employees[index] = {
      name: newName,
      role: newRole
    };

    render();
    renderEmployees();
  }
}
function deleteEmployee(index){

  if(!isAdmin()){
    alert("ไม่มีสิทธิ์");
    return;
  }

  if(confirm("ยืนยันลบพนักงานนี้?")){
    employees.splice(index,1);
    render();
    renderEmployees();
  }
}
function changeTheme(color){
  document.documentElement.style.setProperty("--main", color);
}
function showPage(p){

  votePage.style.display="none";
  reportPage.style.display="none";
  adminPage.style.display="none";

  if(p==="vote") votePage.style.display="block";
  if(p==="report") reportPage.style.display="block";

  if(p==="admin"){
    if(!isAdmin()){
      alert("เฉพาะแอดมิน");
      return;
    }
    adminPage.style.display="block";
    renderEmployees();
  }
  render();
}

function initMonthSelector(){

  const select = document.getElementById("monthSelect");

  if(!select) return; // 🔥 กัน error

  const now = new Date();
  const year = now.getFullYear();

  select.innerHTML = ""; // 🔥 กันซ้ำ

  for(let i=0;i<12;i++){
    const m = String(i+1).padStart(2,'0');
    const value = `${year}-${m}`;

    const option = document.createElement("option");
    option.value = value;
    option.textContent = `${m}/${year}`;

    select.appendChild(option);
  }

  // 👉 ตั้งค่าเดือนปัจจุบัน
  const current = now.toISOString().slice(0,7);
  select.value = current;

  currentMonth = current; // 🔥 ใช้กับระบบโหวต
}

  select.innerHTML = "";

  const monthNames = [
    "ม.ค.","ก.พ.","มี.ค.","เม.ย.","พ.ค.","มิ.ย.",
    "ก.ค.","ส.ค.","ก.ย.","ต.ค.","พ.ย.","ธ.ค."
  ];

  for(let i=0;i<12;i++){
    const m = String(i+1).padStart(2,'0');
    const value = `${year}-${m}`;

    const option = document.createElement("option");
    option.value = value;

    // ✅ ใช้ชื่อเดือน
    option.textContent = monthNames[i];

    select.appendChild(option);
  }

  // ตั้งค่าเดือนปัจจุบัน
  select.value = now.toISOString().slice(0,7);
}
function initVoteMonth(){

  const select = document.getElementById("voteMonth");
  if(!select) return;

  const now = new Date();
  const year = now.getFullYear();

  const monthNames = [
    "ม.ค.","ก.พ.","มี.ค.","เม.ย.","พ.ค.","มิ.ย.",
    "ก.ค.","ส.ค.","ก.ย.","ต.ค.","พ.ย.","ธ.ค."
  ];

  select.innerHTML = "";

  for(let i=0;i<12;i++){
    const m = String(i+1).padStart(2,'0');
    const value = `${year}-${m}`;

    const option = document.createElement("option");
    option.value = value;
    option.textContent = monthNames[i];

    select.appendChild(option);
  }

  // ✅ ตั้งค่าเดือนปัจจุบัน
  const current = now.toISOString().slice(0,7);
  select.value = current;
  currentMonth = current;
}
window.onload = async function(){
  initMonthSelector();
  initVoteMonth();
  initReportMonth();
  await loadData(); // ✅ เพิ่ม
  render();
  // 🔥 เพิ่มตรงนี้
  setInterval(async () => {
    await loadData();
    render();
  }, 5000);
};
function logout(){
  localStorage.removeItem("user");
  window.location.href = "login.html";
}
async function loadData(){

  const res = await fetch(API_URL);
  const data = await res.json();

  votes = {};

  data.forEach(d => {

    if(!votes[d.month]) votes[d.month] = {};

    // 🔥 นับ emoji แยก
    const key = d.name + "_" + d.emoji;
    votes[d.month][key] = (votes[d.month][key] || 0) + 1;

  });

  console.log("votes:", votes); // 👈 debug
}
function exportExcel(){

  fetch(API_URL + "?action=export")
    .then(res => res.json())
    .then(data => {
      window.open(data.url, "_blank");
    });
}
function undoVote(name){

  if(!currentUser || currentUser.role !== "voter"){
    return alert("ไม่มีสิทธิ์");
  }

  if(!confirm("ต้องการยกเลิกโหวตล่าสุดของ " + name + " ?")) return;

  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      action: "undo",
      name: name,
      month: currentMonth,
      user: currentUser.username
    })
  })
  .then(res => res.text())
  .then(msg => {
    alert(msg);
    loadData().then(render);
  });
}
