<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Login</title>
</head>

<body style="font-family:Sarabun;text-align:center;margin-top:100px;">

<h2>🔐 เข้าสู่ระบบ</h2>

<input id="user" placeholder="Username"><br><br>
<input id="pass" type="password" placeholder="Password"><br><br>

<button onclick="login()">เข้าสู่ระบบ</button>

<script>
let users=[
  {username:"p",password:"p",role:"admin"},
  {username:"s",password:"s",role:"voter"}
];

function login(){
  const u=document.getElementById("user").value;
  const p=document.getElementById("pass").value;

  const found=users.find(x=>x.username===u && x.password===p);

  if(found){
    localStorage.setItem("user", JSON.stringify(found));
    window.location.href = "index.html"; // 👈 กลับไปหน้าหลัก
  }else{
    alert("ชื่อผู้ใช้หรือรหัสผ่านผิด");
  }
}
</script>

</body>
</html>
